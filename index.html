<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stalcraft Auction House - Black Gold Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            color: #d4af37;
            padding: 20px;
            background-image: radial-gradient(circle at 15% 30%, rgba(212, 175, 55, 0.06) 2%, transparent 2.5%),
                              radial-gradient(circle at 75% 70%, rgba(212, 175, 55, 0.04) 1.8%, transparent 2%);
            background-size: 55px 55px, 70px 70px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(1px);
            border: 2px solid #d4af37;
            border-radius: 32px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3), inset 0 0 10px rgba(212, 175, 55, 0.1);
            padding: 24px 28px 32px;
        }

        h1 {
            text-align: center;
            font-size: 2.4rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 0 6px #b48c2c;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 18px;
            margin-bottom: 24px;
        }

        .lang-switch {
            text-align: right;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: #0f0f0f;
            border: 1.5px solid #d4af37;
            color: #ffeaac;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 10px;
        }

        .lang-btn.active {
            background: #d4af37;
            color: #0a0a0a;
            border-color: #ffdfa0;
        }

        .lang-btn:hover {
            border-color: #f5cb5c;
            background: #1f1a0a;
        }

        .emission-box {
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0;
            padding: 14px 20px;
            background: #0f0f0f;
            border-radius: 40px;
            border-left: 4px solid #d4af37;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
            align-items: center;
        }

        select, input, button {
            padding: 10px 16px;
            border-radius: 40px;
            border: 1.5px solid #d4af37;
            background: #0f0f0f;
            color: #ffeaac;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        input {
            cursor: text;
            flex: 1;
            min-width: 200px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #f5cb5c;
            box-shadow: 0 0 6px #d4af37;
        }

        button:hover {
            background: #d4af37;
            color: #0a0a0a;
            border-color: #ffdfa0;
        }

        .token-section {
            background: #0f0f0f;
            border-radius: 28px;
            padding: 18px 20px;
            margin: 20px 0;
            border: 1px solid #d4af37;
        }

        .token-section strong {
            color: #efcd7b;
        }

        .manual-section {
            background: #0f0f0f;
            border-radius: 28px;
            padding: 18px 20px;
            margin: 20px 0;
            border: 1px solid #d4af37;
        }

        .warning-text {
            color: #ffaa66;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .item-list {
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            background: #050505;
        }

        .item {
            padding: 12px 18px;
            margin: 4px 8px;
            background: #0f0f0f;
            border-radius: 40px;
            cursor: pointer;
            border-left: 4px solid #d4af37;
            transition: all 0.15s;
        }

        .item:hover {
            background: #1f1a0a;
            transform: translateX(4px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #0f0f0f;
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
        }

        th, td {
            padding: 14px 12px;
            border-bottom: 1px solid #2a2a2a;
            text-align: left;
        }

        th {
            background: #1a1508;
            color: #d4af37;
            cursor: pointer;
            font-weight: bold;
        }

        th:hover {
            background: #2a2412;
        }

        .price {
            color: #ffdd88;
            font-weight: bold;
        }

        .error {
            color: #ff8866;
        }

        .success {
            color: #88ffaa;
        }

        .status-area {
            margin: 15px 0;
            min-height: 40px;
            font-weight: bold;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #b49450;
            border: 1px dashed #d4af37;
            border-radius: 28px;
            margin: 20px 0;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.7rem;
            color: #ad8f47;
            border-top: 1px solid #5f4c1a;
            padding-top: 18px;
        }

        @media (max-width: 700px) {
            .container { padding: 16px; }
            .controls { flex-direction: column; align-items: stretch; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="lang-switch">
        <button class="lang-btn active" data-lang="ru">РУССКИЙ</button>
        <button class="lang-btn" data-lang="en">ENGLISH</button>
    </div>

    <h1 id="mainTitle">STALCRAFT AUCTION HOUSE</h1>

    <div id="emissionInfo" class="emission-box">Emission: Loading data...</div>

    <div class="controls">
        <select id="region">
            <option value="RU">RU</option>
            <option value="EU">EU</option>
        </select>
        <input type="text" id="search" placeholder="Search by name..." style="width:300px;" onkeypress="if(event.key==='Enter') searchItems()">
        <button id="searchBtn">Search</button>
    </div>

    <div class="controls">
        <select id="categoryFilter">
            <option value="">All categories</option>
            <option value="weapon">Weapon</option>
            <option value="armor">Armor</option>
            <option value="artifact">Artifacts</option>
            <option value="supply">Supplies</option>
            <option value="misc">Other</option>
        </select>
        <div style="flex:1"></div>
        <div class="sort-buttons" style="display:flex; gap:8px;">
            <button id="sortPriceUp">Price ↑</button>
            <button id="sortPriceDown">Price ↓</button>
        </div>
    </div>

    <div class="token-section">
        <strong id="tokenLabel">Authorization (required):</strong><br>
        <input type="password" id="apiToken" placeholder="Paste your API token here" style="width:100%; margin-top:8px;">
        <div id="tokenWarning" class="warning-text">Token is required to fetch auction lots</div>
    </div>

    <div class="manual-section">
        <strong id="manualLabel">Manual mode (most reliable):</strong><br>
        <input type="text" id="manualId" placeholder="Item ID (zyv9, atom, etc.)" style="width:70%; margin-top:8px;" onkeypress="if(event.key==='Enter') fetchByManualId()">
        <button id="manualBtn">SHOW LOTS</button>
    </div>

    <div id="itemList" class="item-list"></div>
    <div id="status" class="status-area"></div>

    <table id="lotsTable" style="display:none;">
        <thead>
        <tr>
            <th id="thItem">Item</th>
            <th id="thPrice">Price</th>
            <th id="thAmount">Amount</th>
            <th id="thSeller">Seller</th>
            <th id="thTimeLeft">Time left</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
    <footer>Black Gold Auction Monitor | Data from EXBO database & auction API</footer>
</div>

<script>
    let allItems = [];
    let currentLots = [];
    let currentItemName = "";
    let currentItemId = "";
    let emissionTimerInterval;
    let currentLang = "ru";

    const translations = {
        ru: {
            mainTitle: "СТАЛКРАФТ АУКЦИОН",
            emissionLoading: "Выброс: загрузка данных...",
            emissionLast: "Последний выброс (RU)",
            emissionAgo: "назад",
            emissionActive: "ИДЁТ ВЫБРОС",
            emissionNone: "Нет выброса",
            searchPlaceholder: "Поиск по названию...",
            searchBtn: "Искать",
            tokenLabel: "Авторизация (обязательно):",
            tokenPlaceholder: "Вставьте ваш API токен",
            tokenWarning: "Токен нужен для загрузки лотов!",
            manualLabel: "Ручной режим (самый надёжный):",
            manualPlaceholder: "ID предмета (zyv9, atom и т.д.)",
            manualBtn: "ПОКАЗАТЬ ЛОТЫ",
            loadingItems: "Загружаем список предметов...",
            itemsLoaded: "Загружено предметов",
            noItemsFound: "Ничего не найдено",
            loadingLots: "Загрузка лотов для",
            lotsEmpty: "лотов сейчас нет",
            lotsFound: "лотов",
            fetchError: "Ошибка загрузки лотов",
            timeoutError: "Запрос превысил время ожидания (15 сек). Попробуйте еще раз.",
            checkToken: "Пожалуйста, вставьте ваш API токен в поле выше!",
            enterItemId: "Введите ID предмета",
            thItem: "Предмет",
            thPrice: "Цена",
            thAmount: "Кол-во",
            thSeller: "Продавец",
            thTimeLeft: "Осталось",
            priceSymbol: "⚡",
            hours: "ч",
            minutes: "м",
            noLots: "Ничего не найдено"
        },
        en: {
            mainTitle: "STALCRAFT AUCTION HOUSE",
            emissionLoading: "Emission: loading data...",
            emissionLast: "Last emission (RU)",
            emissionAgo: "ago",
            emissionActive: "EMISSION ACTIVE",
            emissionNone: "No emission",
            searchPlaceholder: "Search by name...",
            searchBtn: "Search",
            tokenLabel: "Authorization (required):",
            tokenPlaceholder: "Paste your API token here",
            tokenWarning: "Token is required to fetch auction lots",
            manualLabel: "Manual mode (most reliable):",
            manualPlaceholder: "Item ID (zyv9, atom, etc.)",
            manualBtn: "SHOW LOTS",
            loadingItems: "Loading items list...",
            itemsLoaded: "Items loaded",
            noItemsFound: "Nothing found",
            loadingLots: "Loading lots for",
            lotsEmpty: "no lots available",
            lotsFound: "lots",
            fetchError: "Error loading lots",
            timeoutError: "Request timeout (15 sec). Please try again.",
            checkToken: "Please paste your API token in the field above!",
            enterItemId: "Enter item ID",
            thItem: "Item",
            thPrice: "Price",
            thAmount: "Amount",
            thSeller: "Seller",
            thTimeLeft: "Time left",
            priceSymbol: "⚡",
            hours: "h",
            minutes: "m",
            noLots: "Nothing found"
        }
    };

    function t(key, params = {}) {
        let text = translations[currentLang][key] || key;
        for (const [k, v] of Object.entries(params)) {
            text = text.replace(`{${k}}`, v);
        }
        return text;
    }

    function updateUITexts() {
        document.getElementById('mainTitle').innerText = t('mainTitle');
        document.getElementById('search').placeholder = t('searchPlaceholder');
        document.getElementById('searchBtn').innerText = t('searchBtn');
        document.getElementById('tokenLabel').innerHTML = t('tokenLabel');
        document.getElementById('apiToken').placeholder = t('tokenPlaceholder');
        document.getElementById('tokenWarning').innerText = t('tokenWarning');
        document.getElementById('manualLabel').innerHTML = t('manualLabel');
        document.getElementById('manualId').placeholder = t('manualPlaceholder');
        document.getElementById('manualBtn').innerText = t('manualBtn');
        document.getElementById('thItem').innerText = t('thItem');
        document.getElementById('thPrice').innerText = t('thPrice');
        document.getElementById('thAmount').innerText = t('thAmount');
        document.getElementById('thSeller').innerText = t('thSeller');
        document.getElementById('thTimeLeft').innerText = t('thTimeLeft');
        
        if (allItems.length > 0) {
            const container = document.getElementById('itemList');
            if (container.innerHTML !== '' && !container.innerHTML.includes('no-results')) {
                searchItems();
            }
        }
        
        const statusDiv = document.getElementById('status');
        if (statusDiv.innerHTML && currentItemName) {
            fetchLots(currentItemId, currentItemName);
        }
    }

    async function loadEmissionInfo() {
        const info = document.getElementById('emissionInfo');
        try {
            const res = await fetch('https://eapi.stalcraft.net/emission');
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            const data = await res.json();
            const currentTime = Date.now() / 1000;
            const ruData = data.find(region => region.region === 'RU');
            if (!ruData) throw new Error('No RU region data');

            const lastEmission = ruData.last_emission;
            const diffSeconds = currentTime - lastEmission;
            const h = Math.floor(diffSeconds / 3600);
            const m = Math.floor((diffSeconds % 3600) / 60);
            const s = Math.floor(diffSeconds % 60);

            if (currentLang === 'ru') {
                info.innerHTML = `Последний выброс (RU): <span style="color:#88ffaa">${h}ч ${m}м ${s}с назад</span> | Текущий статус: ${ruData.current_emission ? 'ИДЁТ ВЫБРОС' : 'Нет выброса'}`;
            } else {
                info.innerHTML = `Last emission (RU): <span style="color:#88ffaa">${h}h ${m}m ${s}s ago</span> | Current status: ${ruData.current_emission ? 'EMISSION ACTIVE' : 'No emission'}`;
            }
        } catch(e) {
            info.innerHTML = `<span class="error">${currentLang === 'ru' ? 'Не удалось загрузить данные о выбросах' : 'Failed to load emission data'}</span>`;
            console.error("Emission error:", e);
        }
    }

    function startEmissionTimer() {
        if (emissionTimerInterval) clearInterval(emissionTimerInterval);
        loadEmissionInfo();
        emissionTimerInterval = setInterval(loadEmissionInfo, 60000);
    }

    async function loadItems() {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = t('loadingItems');
        try {
            const res = await fetch('https://raw.githubusercontent.com/EXBO-Studio/stalcraft-database/main/ru/listing.json');
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            const data = await res.json();

            allItems = data.map(item => {
                const path = item.data || '';
                let category = 'misc';
                if (path.includes('/weapon/')) category = 'weapon';
                else if (path.includes('/armor/')) category = 'armor';
                else if (path.includes('/artefact/') || path.includes('/artifact/')) category = 'artifact';
                else if (path.includes('/supply/')) category = 'supply';

                return {
                    id: path.split('/').pop().replace('.json', ''),
                    name: item.name?.lines?.ru || 'Без названия',
                    category: category
                };
            }).filter(i => i.name !== 'Без названия')
              .sort((a, b) => a.name.localeCompare(b.name));

            renderItems(allItems);
            statusDiv.innerHTML = `<span class="success">${t('itemsLoaded')}: ${allItems.length}</span>`;
        } catch (e) {
            statusDiv.innerHTML = `<span class="error">${t('fetchError')}</span>`;
            console.error(e);
        }
    }

    function renderItems(items) {
        const container = document.getElementById('itemList');
        container.innerHTML = '';
        if (items.length === 0) {
            container.innerHTML = `<div class="no-results">${t('noItemsFound')}</div>`;
            return;
        }
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = item.name;
            div.onclick = () => fetchLots(item.id, item.name);
            container.appendChild(div);
        });
    }

    function searchItems() {
        const query = document.getElementById('search').value.toLowerCase().trim();
        if (!query) return renderItems(allItems);
        renderItems(allItems.filter(i => i.name.toLowerCase().includes(query)));
    }

    function filterByCategory() {
        const cat = document.getElementById('categoryFilter').value;
        if (!cat) return renderItems(allItems);
        renderItems(allItems.filter(i => i.category === cat));
    }

    async function fetchByManualId() {
        const id = document.getElementById('manualId').value.trim();
        if (!id) {
            alert(t('enterItemId'));
            return;
        }
        await fetchLots(id, id);
    }

    async function fetchLots(itemId, itemName) {
        const token = document.getElementById('apiToken').value.trim();
        if (!token) {
            alert(t('checkToken'));
            return;
        }

        const region = document.getElementById('region').value;
        const statusDiv = document.getElementById('status');
        const table = document.getElementById('lotsTable');
        const tbody = table.querySelector('tbody');

        currentItemId = itemId;
        currentItemName = itemName;
        statusDiv.textContent = `${t('loadingLots')} "${itemName}"... (15 sec max)`;
        table.style.display = 'none';
        tbody.innerHTML = '';

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);

        try {
            const apiUrl = `https://eapi.stalcraft.net/${region}/auction/${itemId}/lots?limit=50`;
            const res = await fetch(apiUrl, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                signal: controller.signal
            });

            clearTimeout(timeout);

            if (!res.ok) {
                const errorText = await res.text();
                throw new Error(`${t('fetchError')} ${res.status}: ${errorText}`);
            }

            const data = await res.json();
            currentLots = data.lots || [];

            if (currentLots.length === 0) {
                statusDiv.innerHTML = `<span class="success">${itemName} — ${t('lotsEmpty')}</span>`;
                table.style.display = 'none';
                return;
            }

            statusDiv.innerHTML = `<span class="success">${itemName} — ${currentLots.length} ${t('lotsFound')}</span>`;
            table.style.display = 'table';
            displayLots();
        } catch (e) {
            clearTimeout(timeout);
            if (e.name === 'AbortError') {
                statusDiv.innerHTML = `<span class="error">${t('timeoutError')}</span>`;
            } else {
                statusDiv.innerHTML = `<span class="error">${t('fetchError')}: ${e.message}</span>`;
            }
            console.error(e);
        }
    }

    function displayLots() {
        const tbody = document.querySelector('#lotsTable tbody');
        tbody.innerHTML = '';
        currentLots.forEach(lot => {
            const row = document.createElement('tr');
            let timeLeft = "—";
            if (lot.timeLeft) {
                const h = Math.floor(lot.timeLeft / 3600);
                const m = Math.floor((lot.timeLeft % 3600) / 60);
                timeLeft = `${h}${t('hours')} ${m}${t('minutes')}`;
            }
            row.innerHTML = `
                <td>${currentItemName}</td>
                <td class="price">${lot.price?.toLocaleString() || 0} ${t('priceSymbol')}</td>
                <td>${lot.amount || 1}</td>
                <td>${lot.seller || '—'}</td>
                <td>${timeLeft}</td>
            `;
            tbody.appendChild(row);
        });
    }

    function sortByPrice(dir) {
        if (!currentLots.length) return;
        currentLots.sort((a, b) => (a.price - b.price) * dir);
        displayLots();
    }

    window.onload = () => {
        loadItems();
        startEmissionTimer();

        document.getElementById('categoryFilter').addEventListener('change', filterByCategory);
        document.getElementById('searchBtn').addEventListener('click', searchItems);
        document.getElementById('manualBtn').addEventListener('click', fetchByManualId);
        document.getElementById('sortPriceUp').addEventListener('click', () => sortByPrice(1));
        document.getElementById('sortPriceDown').addEventListener('click', () => sortByPrice(-1));
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.getAttribute('data-lang');
                updateUITexts();
                loadEmissionInfo();
            });
        });
    };

    window.addEventListener('beforeunload', () => {
        if (emissionTimerInterval) clearInterval(emissionTimerInterval);
    });
</script>
</body>
</html>
